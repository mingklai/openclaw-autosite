<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OpenClaw News</title>
<style>
body {font-family: Arial, sans-serif; margin: 20px;}
article {border-bottom: 1px solid #ccc; padding: 10px 0;}
</style>
</head>
<body>
<h1>Top US News</h1>
<div id="news"></div>
<script>
async function loadNews(){
  try {
    const resp = await fetch('https://newsapi.org/v2/top-headlines?country=us&apiKey=96ea939b0c414693b3bc7a5cc6d0276b');
    const data = await resp.json();
    const container = document.getElementById('news');
    data.articles.forEach(a=>{
      const el=document.createElement('article');
      el.innerHTML=`<h2>${a.title}</h2><p>${a.description||''}</p><a href="${a.url}" target="_blank">Read more</a>`;
      container.appendChild(el);
    });
  } catch(e){
    document.getElementById('news').textContent='Failed to load news.';
  }
}
loadNews();
</script>
</body>
</html>
