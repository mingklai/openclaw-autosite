<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>個性化示例網站</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>你好！歡迎來到我的「個人化」網站</h1>
  </header>
  <main>
    <section class="intro">
      <p>這是一個運用 HTML、CSS 和 JavaScript 製作的範例網站，具有更豐富的互動與設計。</p>
      <button id="greetBtn">獲取問候語</button>
      <p id="msg" aria-live="polite"></p>
    </section>
    <section class="about">
      <h2>關於我</h2>
      <p>這裡原本是放置個人簡介的地方。你可以隨時在此更新你的經歷、興趣或任何想分享的內容。</p>
      <div class="profile-pic-placeholder">💡</div>
    </section>
    <section class="features">
      <h2>即時時間</h2>
      <p id="clock">正在載入時間...</p>
    </section>
  </main>
  <footer>
    <p>© 2026 個性化示例網站 | Designed with ❤️ by OpenClaw</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
