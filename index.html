<!DOCTYPE html>
<html>
<head><title>Top US News</title></head>
<body>
<h1>Top US News Headlines</h1>
<ul id="news"></ul>
<script>
fetch('https://newsapi.org/v2/top-headlines?country=us&apiKey=96ea939b0c414693b3bc7a5cc6d0276b')
  .then(r=>r.json())
  .then(data=>{
    const ul=document.getElementById('news');
    data.articles.forEach(a=>{
      const li=document.createElement('li');
      const aTag=document.createElement('a');
      aTag.href=a.url; aTag.textContent=a.title; aTag.target='_blank';
      li.appendChild(aTag);
      ul.appendChild(li);
    });
  })
  .catch(err=>console.error(err));
</script>
</body>
</html>
